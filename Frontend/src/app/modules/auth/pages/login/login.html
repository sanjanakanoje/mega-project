<!-- login.html -->

<div class="login-page">

  <div class="login-card">

    <h2>Welcome Back</h2>
    <p class="sub-text">Login to continue</p>

    <form (ngSubmit)="loginUser()" #loginForm="ngForm">

      <div class="input-box">
        <label>Email</label>
        <input
          type="email"
          name="email"
          [(ngModel)]="formData.email"
          placeholder="Enter your email"
          required>
      </div>

      <div class="input-box">
        <label>Password</label>
        <input
          type="password"
          name="password"
          [(ngModel)]="formData.password"
          placeholder="Enter password"
          required>
      </div>

      <button type="submit">
        Login
      </button>

    </form>

    <p class="bottom-text">
      New User?
      <a [routerLink]="['/auth/register']">Create Account</a>
    </p>

  </div>

</div>
